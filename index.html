<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Greentek Field Dashboard</title>

  <style>
    :root {
      --bg: #f4f6f5;
      --green-dark: #1f3a1a;
      --green-main: #2f5d1e;
      --green-soft: #4a7c36;
      --text-light: #ffffff;
      --muted: #6b7280;
      --radius: 14px;
      --shadow: 0 6px 18px rgba(0, 0, 0, 0.10);
      --critical-bg: #1e3a1a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 24px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
    }

    /* HEADER */
    header {
      display: flex;
      align-items: center;
      gap: 18px;
      margin-bottom: 32px;
    }

    .logo {
      height: 48px;
      width: auto;
    }

    header h1 {
      margin: 0;
      font-size: 26px;
      font-weight: 700;
      color: var(--green-dark);
    }

    /* SECTIONS */
    section {
      margin-bottom: 36px;
      border-top: 1px solid rgba(0, 0, 0, 0.05);
      padding-top: 28px;
    }

    section:first-of-type {
      border-top: none;
      padding-top: 0;
    }

    section h2 {
      margin-bottom: 14px;
      font-size: 13px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 20px;
    }

    .card {
      border-radius: var(--radius);
      padding: 26px;
      min-height: 88px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-weight: 600;
      font-size: 16px;
      text-decoration: none;
      color: var(--text-light);
      background: linear-gradient(135deg, var(--green-dark), var(--green-main));
      box-shadow: var(--shadow);
      transition: transform 0.12s ease, box-shadow 0.12s ease;
      touch-action: manipulation;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.14);
    }

    .card:active {
      transform: translateY(0);
      box-shadow: 0 5px 14px rgba(0, 0, 0, 0.12);
    }

    .alt2 {
      background: linear-gradient(135deg, var(--green-main), var(--green-soft));
    }

    .critical {
      background: linear-gradient(135deg, var(--critical-bg), var(--green-main));
    }

    .maintenance {
      background: linear-gradient(135deg, #2d343a, #464f57);
    }

    @media (max-width: 600px) {
      body {
        padding: 16px;
      }

      header h1 {
        font-size: 22px;
      }
    }
  </style>
</head>

<body>
